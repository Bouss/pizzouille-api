nelmio_api_doc:
    documentation:
        info:
            title: Pizzouille API
            description: RESTful API for managing pizza and ingredients
            version: 1.0.0
        servers:
            - url: https://www.pizzouille.localhost
              description: Local development server
        components:
            securitySchemes: []
    areas:
        path_patterns:
            - ^/api(?!/doc$) # Accepts routes under /api except /api/doc
